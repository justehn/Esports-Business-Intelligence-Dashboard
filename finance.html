<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard - ERP Portal</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="C9_logo.png">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">
            <img src="C9_logo.png" alt="C9 Logo" style="height: 30px; margin-right: 10px;">
            C9 ERP Portal
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active"><a class="nav-link" href="finance.html">Finance</a></li>
                <li class="nav-item"><a class="nav-link" href="sales.html">Sales</a></li>
                <li class="nav-item"><a class="nav-link" href="crm.html">CRM</a></li>
                <li class="nav-item"><a class="nav-link" href="production.html">Production</a></li>
                <li class="nav-item"><a class="nav-link" href="supply_chain.html">Supply Chain</a></li>
            </ul>
        </div>
    </nav>

    <div class="center-container">
        <div class="container text-center">
            <h1 class="mb-5 display-4 font-weight-bold">Finance Analytics</h1>
            <div class="row justify-content-center">
                <!-- Monthly Trends -->
                <div class="col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">Financial Trends</h5>
                            <canvas id="financeChart"></canvas>
                        </div>
                    </div>
                </div>
                <!-- Revenue By Source -->
                <div class="col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">Revenue by Source</h5>
                            <canvas id="revenueSourceChart"></canvas>
                        </div>
                    </div>
                </div>
                <!-- Cash Flow and Budget Stack -->
                <div class="col-md-6 mb-4">
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Quarterly Cash Flow</h5>
                            <canvas id="cashFlowChart"></canvas>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Budget vs Actual</h5>
                            <canvas id="budgetChart"></canvas>
                        </div>
                    </div>
                </div>
                <!-- Expense Breakdown -->
                <div class="col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">Expense Breakdown</h5>
                            <canvas id="expensePieChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        // Global Chart Defaults for Dark Theme
        Chart.defaults.color = '#adb5bd';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.1)';

        var ctxTrends = document.getElementById('financeChart').getContext('2d');
        var financeChart = new Chart(ctxTrends, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Revenue',
                    data: [],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 2,
                    fill: true
                },
                {
                    label: 'Expenses',
                    data: [],
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function (value) {
                                return '$' + value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });

        var ctxRevenueSource = document.getElementById('revenueSourceChart').getContext('2d');
        var revenueSourceChart = new Chart(ctxRevenueSource, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Revenue Amount',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function (value) {
                                return '$' + value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });

        var ctxCashFlow = document.getElementById('cashFlowChart').getContext('2d');
        var cashFlowChart = new Chart(ctxCashFlow, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Inflow',
                    data: [],
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                },
                {
                    label: 'Outflow',
                    data: [],
                    backgroundColor: 'rgba(255, 99, 132, 0.6)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function (value) {
                                return '$' + value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });

        var ctxExpense = document.getElementById('expensePieChart').getContext('2d');
        var expensePieChart = new Chart(ctxExpense, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true
            }
        });

        var ctxBudget = document.getElementById('budgetChart').getContext('2d');
        var budgetChart = new Chart(ctxBudget, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Budget',
                    data: [],
                    backgroundColor: 'rgba(153, 102, 255, 0.6)',
                    borderColor: 'rgba(153, 102, 255, 1)',
                    borderWidth: 1
                },
                {
                    label: 'Actual',
                    data: [],
                    backgroundColor: 'rgba(255, 159, 64, 0.6)',
                    borderColor: 'rgba(255, 159, 64, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function (value) {
                                return '$' + value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });

        function fetchDataAndUpdateChart() {
            Papa.parse('erp_csv_data/finance_monthlySummary.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    var filteredData = results.data.filter(row => row.month);
                    var labels = filteredData.map(row => row.month);
                    var revenueData = filteredData.map(row => Number(row.revenue));
                    var expensesData = filteredData.map(row => Number(row.expenses));

                    financeChart.data.labels = labels;
                    financeChart.data.datasets[0].data = revenueData;
                    financeChart.data.datasets[1].data = expensesData;
                    financeChart.update();
                },
                error: function (error) {
                    console.error('Error fetching or parsing data:', error);
                }
            });

            Papa.parse('erp_csv_data/finance_revenueBySource.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    var filteredData = results.data.filter(row => row.source);
                    var labels = filteredData.map(row => row.source);
                    var data = filteredData.map(row => Number(row.amount));

                    revenueSourceChart.data.labels = labels;
                    revenueSourceChart.data.datasets[0].data = data;
                    revenueSourceChart.update();
                },
                error: function (error) {
                    console.error('Error fetching or parsing data:', error);
                }
            });

            Papa.parse('erp_csv_data/finance_cashFlowQuarterly.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    var filteredData = results.data.filter(row => row.quarter);
                    var labels = filteredData.map(row => row.quarter);
                    var inflowData = filteredData.map(row => Number(row.inflow));
                    var outflowData = filteredData.map(row => Number(row.outflow));

                    cashFlowChart.data.labels = labels;
                    cashFlowChart.data.datasets[0].data = inflowData;
                    cashFlowChart.data.datasets[1].data = outflowData;
                    cashFlowChart.update();
                },
                error: function (error) {
                    console.error('Error fetching or parsing data:', error);
                }
            });

            Papa.parse('erp_csv_data/finance_expenseBreakdown.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    var filteredData = results.data.filter(row => row.category);
                    var labels = filteredData.map(row => row.category);
                    var data = filteredData.map(row => Number(row.amount));

                    expensePieChart.data.labels = labels;
                    expensePieChart.data.datasets[0].data = data;
                    expensePieChart.update();
                },
                error: function (error) {
                    console.error('Error fetching or parsing data:', error);
                }
            });

            Papa.parse('erp_csv_data/finance_departmentBudgets.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    var filteredData = results.data.filter(row => row.department);
                    var labels = filteredData.map(row => row.department);
                    var budgetData = filteredData.map(row => Number(row.budget));
                    var actualData = filteredData.map(row => Number(row.actual));

                    budgetChart.data.labels = labels;
                    budgetChart.data.datasets[0].data = budgetData;
                    budgetChart.data.datasets[1].data = actualData;
                    budgetChart.update();
                },
                error: function (error) {
                    console.error('Error fetching or parsing data:', error);
                }
            });
        }
        fetchDataAndUpdateChart();
    </script>
    <footer>
        <div class="container">
            <p>&copy; Justin Martir 2026</p>
            <p>Created for CIS 3110. Business Intelligence Portal with JavaScript.</p>
        </div>
    </footer>
</body>

</html>
